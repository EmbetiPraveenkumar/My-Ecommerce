{% extends 'base.html' %}

{% block content %}

<style>
    .register-card{
        border:none;
        border-radius:20px;
        overflow:hidden;
    }

    .register-header{
        background:linear-gradient(135deg,#0d6efd,#6610f2);
        color:white;
        padding:30px;
    }

    .register-body{
        padding:35px;
    }

    .form-control{
        height:50px;
        border-radius:10px;
    }

    .register-btn{
        height:50px;
        border-radius:10px;
        font-weight:600;
    }
</style>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow-lg register-card">

                <!-- Header -->
                <div class="register-header bg-dark text-white text-center py-4 ">

                    <h2 class="fw-bold mb-2">
                        🛍 Create Account
                    </h2>

                    <p class="mb-0">
                        Join our Ecommerce Store today
                    </p>

                </div>

                <!-- Body -->
                <div class="register-body">

                    <form method="POST">

                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                👤 Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Enter Username"
                                required>

                        </div>

                        <!-- Email -->
                        <div class="mb-3">

                            <label class="form-label fw-bold">
                                📧 Email Address
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Email"
                                required>

                        </div>

                        <!-- Password -->
                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                🔒 Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter Password"
                                required>

                        </div>

                        <!-- Register Button -->
                        <button
                            type="submit"
                            class="btn btn-success register-btn w-100">

                            Create Account

                        </button>

                    </form>

                    <hr class="my-4">

                    <!-- Login Link -->
                    <div class="text-center">

                        <p class="text-muted mb-2">
                            Already have an account?
                        </p>

                        <a href="{% url 'login_view' %}"
                           class="btn btn-outline-primary">

                            Login Here

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
